<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0f1117">
  <title>Fluid Modular Type Scale — Font Size Scaler</title>
  <script>
    (function () {
      var path = location.pathname;
      if (path.endsWith('/index.html')) path = path.slice(0, -10);
      else if (path.endsWith('index.html')) path = path.slice(0, -10);
      else if (!path.endsWith('/')) {
        var last = path.split('/').pop() || '';
        path = last.includes('.') ? path.slice(0, path.lastIndexOf('/') + 1) : path + '/';
      }
      var base = document.createElement('base');
      base.href = path || './';
      document.head.appendChild(base);
    })();
  </script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div>
        <h1 id="headerTitle">Fluid Modular Type Scale</h1>
        <p id="headerSubtitle"></p>
      </div>
      <div class="lang-toggle" id="langToggle"></div>
    </div>
  </header>

  <div class="layout">
    <aside id="controls"></aside>
    <main id="main"></main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
